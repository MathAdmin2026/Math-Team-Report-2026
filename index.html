<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPD-Math Team Status Report</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mathadmin2026.github.io/Math-Team-Report-2026/">
    <meta property="og:title" content="EPD-Math Team Status Report">
    <meta property="og:description" content="Combined Operations Dashboard - June 2026">
    <meta property="og:image" content="https://mathadmin2026.github.io/Math-Team-Report-2026/social-preview.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>EPD-Math Team Status Report</h1>
        <p>Combined Operations Dashboard — June 2026</p>
    </header>

    <main class="report-container">
        <section class="status-card finished-card">
            <h2>Finished</h2>
            <ul id="finished-list">
                </ul>
        </section>

        <section class="status-card ongoing-card">
            <h2>Ongoing</h2>
            <ul id="ongoing-list">
                </ul>
        </section>

        <section class="status-card delayed-card">
            <h2>Delayed</h2>
            <ul id="delayed-list">
                </ul>
        </section>
    </main>

    <script>
        // EDIT YOUR REPORT ITEMS INSIDE THESE BRACKETS:
        const reportData = {
            finished: [
                "Project Alpha Final Documentation",
                "Q2 Budget Optimization Model",
                "Automated Script Migration"
            ],
            ongoing: [
                "Data Pipeline Synchronization",
                "Cross-Department Inventory Audit"
            ],
            delayed: [
                "Legacy Server Decommissioning (Pending IT approval)"
            ]
        };

        // AUTOMATION ENGINE: Injects the items into the HTML above
        function populateList(elementId, itemsArray) {
            const listElement = document.getElementById(elementId);
            if (!listElement) return;
            
            listElement.innerHTML = itemsArray
                .map(item => `<li>${item}</li>`)
                .join('');
        }

        // Run automation on page load
        populateList("finished-list", reportData.finished);
        populateList("ongoing-list", reportData.ongoing);
        populateList("delayed-list", reportData.delayed);
    </script>

</body>
</html>
