<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPD-Math Status Report</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mathadmin2026.github.io/Math-Team-Report-2026/">
    <meta property="og:title" content="EPD-Math Status Report">
    <meta property="og:description" content="Combined Operations Dashboard — June 2026">
    <meta property="og:image" content="https://mathadmin2026.github.io/Math-Team-Report-2026/social-preview.png">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* Simple styling to keep the chart centered and responsive */
        .chart-container {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .chart-container h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <header>
        <h1>EPD-Math Status Report</h1>
        <p>Combined Operations Dashboard — June 2026</p>
    </header>

    <main class="report-container">
        <section class="status-card finished-card">
            <h2>Finished Titles</h2>
            <ul id="finished-list"></ul>
        </section>

        <section class="status-card ongoing-card">
            <h2>Ongoing Titles</h2>
            <ul id="ongoing-list"></ul>
        </section>

        <section class="status-card delayed-card">
            <h2>Delayed Titles</h2>
            <ul id="delayed-list"></ul>
        </section>

        <div class="chart-container">
            <h3>Project Status Breakdown</h3>
            <canvas id="statusPieChart"></canvas>
        </div>
    </main>

    <script>
        // EDIT YOUR REPORT ITEMS INSIDE THESE BRACKETS:
        const reportData = {
            finished: [
                "Grade 10 Science Textbook"
            ],
            ongoing: [
                "Elementary English Workbook"
            ],
            delayed: [
                "Introduction to Literature"
            ]
        };

        // 1. AUTOMATION ENGINE: Injects items into lists
        function populateList(elementId, itemsArray) {
            const listElement = document.getElementById(elementId);
            if (!listElement) return;
            
            listElement.innerHTML = itemsArray
                .map(item => `<li>${item}</li>`)
                .join('');
        }

        populateList("finished-list", reportData.finished);
        populateList("ongoing-list", reportData.ongoing);
        populateList("delayed-list", reportData.delayed);

        // 2. CHART ENGINE: Counts entries and generates the pie chart
        const ctx = document.getElementById('statusPieChart').getContext('2d');
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Finished', 'Ongoing', 'Delayed'],
                datasets: [{
                    data: [
                        reportData.finished.length, 
                        reportData.ongoing.length, 
                        reportData.delayed.length
                    ],
                    backgroundColor: [
                        '#2ecc71', // Green for Finished
                        '#3498db', // Blue for Ongoing
                        '#e74c3c'  // Red for Delayed
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
    </script>

</body>
</html>
